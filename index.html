<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  html, body, * { touch-action: manipulation; }
</style>
<title>咪的清单</title>
<style>
  :root {
    --bg: #faf9f6;
    --bg-secondary: #f1efe8;
    --bg-card: #ffffff;
    --text: #2c2c2a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.2);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: #378add;
    --purple-bg: #f0e9fb;
    --purple-text: #5b2d99;
    --purple-border: #9b6fd6;
    --warning-bg: #faeeda;
    --warning-text: #854f0b;
    --danger-bg: #fcebeb;
    --danger-text: #a32d2d;
    --habit-bg: #fbe6ec;
    --habit-text: #b13e63;
    --action-delete: #ef6f48;
    --action-edit: #66c18c;
    --action-confirm: #51c4d3;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #19181a;
      --bg-secondary: #252327;
      --bg-card: #211f22;
      --text: #e6e3e0;
      --text-secondary: #a7a2a0;
      --text-tertiary: #76716f;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --info-bg: #1d3447;
      --info-text: #8fc4e8;
      --info-border: #4a90c2;
      --purple-bg: #2e2440;
      --purple-text: #c9aef0;
      --purple-border: #8868b8;
      --warning-bg: #3a2c1a;
      --warning-text: #e0b074;
      --danger-bg: #3a1f1f;
      --danger-text: #e3958f;
      --habit-bg: #3a2230;
      --habit-text: #e497b3;
      --action-delete: #b8543a;
      --action-edit: #4a8f68;
      --action-confirm: #3c93a0;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft Yahei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    padding-bottom: 40px;
  }
  #container { max-width: 480px; margin: 0 auto; padding: 16px; }

  input, select, button, textarea {
    font-family: inherit;
    font-size: 16px;
  }
  input[type="text"], input[type="date"], input[type="number"] {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--info-border);
    box-shadow: 0 0 0 2px rgba(55,138,221,0.25);
  }
  button {
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text);
    padding: 10px 14px;
    cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  label { font-size: 13px; color: var(--text-secondary); }

  .top-tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 3px; margin-bottom: 16px; position: relative; }
  .top-tabs .tab-slider { position: absolute; top: 3px; bottom: 3px; left: 3px; width: calc(50% - 5px); background: var(--bg-card); border-radius: calc(var(--radius-md) - 2px); transition: transform 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .top-tabs button { flex: 1; border: none; background: transparent; padding: 8px; font-size: 14px; color: var(--text-secondary); position: relative; z-index: 1; }
  .top-tabs button.active { color: var(--text); }

  .swipe-row { position: relative; margin-bottom: 6px; border-radius: var(--radius-md); clip-path: inset(0); }
  .swipe-content { display: flex; align-items: center; gap: 10px; padding: 10px 0; position: relative; left: 0; width: 100%; box-sizing: border-box; background-color: var(--bg); transition: left 0.15s ease-out, width 0.15s ease-out, min-height 0.15s ease-out; touch-action: pan-y; z-index: 2; min-height: 38px; }
  .swipe-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 72px; background: var(--action-delete); color: white; border: none; font-size: 14px; cursor: pointer; z-index: 1; }
  .swipe-edit-bg { position: absolute; left: 0; top: 0; bottom: 0; width: 72px; background: var(--action-edit); color: white; border: none; font-size: 14px; cursor: pointer; z-index: 1; }
  .check-btn { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: transparent; display: flex; align-items: center; justify-content: center; padding: 0; }
  .check-btn.done { background: var(--bg-secondary); border-color: var(--border); color: var(--text-tertiary); }
  .row-title { font-size: 15px; flex: 1; min-width: 0; }
  .row-sub { font-size: 12px; margin-top: 2px; }
  .del-btn { border: none; background: none; padding: 6px; color: var(--text-tertiary); font-size: 16px; flex-shrink: 0; }

  .section-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; margin-top: 4px; }

  .form-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-top: 56px; background: var(--bg-card); }
  .form-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .form-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .form-title-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .confirm-btn { background: var(--action-confirm); color: white; border: none; padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; }
  .confirm-btn.editing { background: var(--action-edit); }
  .cancel-edit-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; }
  .type-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .type-btn { padding: 10px 12px; border-radius: var(--radius-md); font-size: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); text-align: left; }
  .type-btn[data-type="habit"].active { border-color: var(--border-strong); background: var(--bg-secondary); color: var(--text); }
  .type-btn[data-type="window"].active { border-color: var(--warning-text); background: var(--warning-bg); color: var(--warning-text); }
  .type-btn[data-type="quota"].active { border-color: var(--info-border); background: var(--info-bg); color: var(--info-text); }
  .type-btn[data-type="once"].active { border-color: var(--danger-text); background: var(--danger-bg); color: var(--danger-text); }
  .type-btn[data-type="anniversary"].active { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }

  .gantt-bar { position: absolute; cursor: default; }
  .anniv-icon { color: var(--purple-text); }

  .empty-state { padding: 32px 0; text-align: center; color: var(--text-tertiary); font-size: 14px; }

  #auth-screen { text-align: center; padding: 60px 20px; }
  #auth-screen h1 { font-size: 20px; margin-bottom: 12px; }
  #auth-screen p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
  #signin-btn { background: var(--info-text); color: white; border: none; padding: 12px 24px; border-radius: var(--radius-md); font-size: 15px; }

  .header-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 16px; min-height: 20px; font-size: 12px; color: var(--text-tertiary); }
  .header-bar #sync-indicator { text-align: center; }
  .header-bar .signout-link { justify-self: end; }
  .header-bar .icon-btn { justify-self: start; border: none; background: none; padding: 0; font-size: 20px; line-height: 1; color: #f28e16; }

  #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 90; }
  #drawer-overlay.open { opacity: 1; pointer-events: auto; }
  #all-tasks-drawer { position: fixed; top: 0; bottom: 0; left: 0; width: 75vw; max-width: 420px; background: var(--bg); box-shadow: 2px 0 16px rgba(0,0,0,0.15); transform: translateX(-100%); transition: transform 0.25s ease; z-index: 91; overflow-y: auto; padding: 20px 16px; box-sizing: border-box; }
  #all-tasks-drawer.open { transform: translateX(0); }
  .drawer-header { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .at-section-label { font-size: 12px; color: var(--text-secondary); margin: 16px 0 8px; }
  .at-row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; width: 100%; box-sizing: border-box; background-color: var(--bg); }
  .at-row .at-name { flex: 1; min-width: 0; font-size: 14px; word-break: break-word; }
  .at-row .at-name.done { color: var(--text-tertiary); text-decoration: line-through; }
  .at-row .at-meta { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; text-align: right; }
  .at-swipe-row { border-bottom: 0.5px solid var(--border); margin-bottom: 0 !important; border-radius: 0 !important; }
  .at-empty { color: var(--text-tertiary); font-size: 13px; padding: 12px 0; }
  .signout-link { font-size: 12px; color: var(--text-tertiary); background: none; border: none; padding: 0; text-decoration: underline; }
</style>
</head>
<body>

<div id="container">
  <div id="auth-screen">
    <h1>咪的清单</h1>
    <p>登录 Google 账号，数据将保存到你的 Google Drive，可在手机和电脑间同步喵。</p>
    <button id="signin-btn" onclick="handleSignIn()">使用 Google 账号登录</button>
  </div>

  <div id="app-screen" style="display:none;">
    <div class="header-bar">
      <button class="icon-btn" onclick="openAllTasks()" aria-label="查看全部任务">💛</button>
      <span id="sync-indicator"></span>
      <button class="signout-link" onclick="handleSignOut()">退出登录</button>
    </div>
    <div id="app"></div>
  </div>

  <div id="drawer-overlay" onclick="closeAllTasks()"></div>
  <div id="all-tasks-drawer">
    <div class="drawer-header">全部任务</div>
    <div id="all-tasks-content"></div>
  </div>
</div>

<script>
// ====== CONFIG ======
const GOOGLE_CLIENT_ID = '740733190154-i102fo21rnqvfr35egnmv8m3vocbvb50.apps.googleusercontent.com';
const DRIVE_FILE_NAME = 'life-planner-data.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

// ====== STATE ======
let tasks = [];
let currentView = 'today';
let selectedType = 'habit';
let selectedAnnivUnit = 'year';
let tokenClient = null;
let accessToken = null;
let driveFileId = null;
let saveTimer = null;

// ====== DATE HELPERS ======
function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2, 7); }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addMonths(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addYears(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setFullYear(d.getFullYear() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b) {
  const da = new Date(a + 'T00:00:00');
  const db = new Date(b + 'T00:00:00');
  return Math.round((db - da) / 86400000);
}
function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return (d.getMonth()+1) + '月' + d.getDate() + '日';
}
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ====== GOOGLE AUTH ======
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        alert('登录失败: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      sessionStorage.setItem('lp_token', accessToken);
      sessionStorage.setItem('lp_token_time', Date.now().toString());
      await onSignedIn();
    }
  });

  // try silent restore
  const savedToken = sessionStorage.getItem('lp_token');
  const savedTime = sessionStorage.getItem('lp_token_time');
  if (savedToken && savedTime && (Date.now() - parseInt(savedTime)) < 50 * 60 * 1000) {
    accessToken = savedToken;
    onSignedIn().catch(() => { showAuthScreen(); });
  } else {
    showAuthScreen();
  }
}

function handleSignIn() {
  tokenClient.requestAccessToken();
}

function handleSignOut() {
  accessToken = null;
  sessionStorage.removeItem('lp_token');
  sessionStorage.removeItem('lp_token_time');
  showAuthScreen();
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'block';
  document.getElementById('app-screen').style.display = 'none';
}

async function onSignedIn() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  setSyncStatus('正在加载数据…');
  await loadFromDrive();
}

async function driveFetch(url, options) {
  options = options || {};
  options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + accessToken });
  const res = await fetch(url, options);
  if (res.status === 401) {
    throw new Error('授权已过期或权限不足 (401): ' + url);
  }
  if (!res.ok) {
    const text = await res.text();
    throw new Error('请求失败: ' + res.status + ' ' + text);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.indexOf('application/json') !== -1) return res.json();
  return res.text();
}

function setSyncStatus(msg) {
  document.getElementById('sync-indicator').textContent = msg || '';
}

// ====== DRIVE STORAGE (uses appDataFolder, hidden from user's normal Drive view) ======
async function findDriveFile() {
  const q = encodeURIComponent("name='" + DRIVE_FILE_NAME + "' and trashed=false");
  const data = await driveFetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=' + q + '&fields=files(id,name)');
  if (data.files && data.files.length > 0) return data.files[0].id;
  return null;
}

async function loadFromDrive() {
  try {
    driveFileId = await findDriveFile();
    if (driveFileId) {
      const content = await driveFetch('https://www.googleapis.com/drive/v3/files/' + driveFileId + '?alt=media');
      tasks = typeof content === 'string' ? JSON.parse(content) : content;
    } else {
      tasks = [];
    }
  } catch (e) {
    console.error(e);
    if (String(e.message).indexOf('401') !== -1) {
      sessionStorage.removeItem('lp_token');
      showAuthScreen();
      setSyncStatus('');
      return;
    }
    tasks = [];
    setSyncStatus('加载失败: ' + e.message);
    render();
    return;
  }
  rollForwardCycles();
  setSyncStatus('已从 Google Drive 加载');
  setTimeout(() => setSyncStatus(''), 1500);
  render();
}

function scheduleSave() {
  setSyncStatus('咪在递交文件…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToDrive, 600);
}

async function saveToDrive() {
  try {
    const content = JSON.stringify(tasks);
    if (!driveFileId) {
      const metadata = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      const created = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST', body: form
      });
      driveFileId = created.id;
    } else {
      await driveFetch('https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: content
      });
    }
    setSyncStatus('交好啦');
    setTimeout(() => setSyncStatus(''), 1200);
  } catch (e) {
    console.error(e);
    setSyncStatus('同步失败，将重试');
  }
}

// ====== TASK LOGIC ======
function rollForwardCycles() {
  const today = todayStr();
  tasks.forEach(t => {
    if (t.type === 'window' && t.recurring) {
      while (today > t.end) {
        const span = daysBetween(t.start, t.end);
        const nextStart = t.cycleUnit === 'month' ? addMonths(t.start, 1) : addDays(t.start, 7);
        t.start = nextStart;
        t.end = addDays(nextStart, span);
        t.done = false; t.doneAt = null;
      }
    }
    if (t.type === 'quota') {
      while (today > t.end) {
        const span = daysBetween(t.start, t.end);
        const nextStart = addDays(t.start, t.cycleDays || 7);
        t.start = nextStart;
        t.end = addDays(nextStart, span);
        t.done = false; t.progress = 0;
      }
    }
    if (t.type === 'anniversary') {
      while (today > t.nextDate) {
        t.nextDate = t.anniversaryUnit === 'year' ? addYears(t.nextDate, 1) : addMonths(t.nextDate, 1);
      }
    }
    if (t.type === 'habit') {
      if (t.done && t.doneAt !== today) {
        t.done = false;
        t.doneAt = null;
      }
    }
  });
}

function addTask(t) {
  tasks.push(Object.assign({ id: uid(), done: false, doneAt: null, progress: 0 }, t));
  scheduleSave();
  renderMain();
  refreshAllTasksIfOpen();
}
function refreshAllTasksIfOpen() {
  const drawer = document.getElementById('all-tasks-drawer');
  if (drawer && drawer.classList.contains('open')) {
    document.getElementById('all-tasks-content').innerHTML = renderAllTasksContent();
    attachSwipeHandlers();
  }
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  if (t.type === 'quota') {
    if (t.done) {
      t.done = false;
      t.progress = Math.max(0, t.progress - 1);
    } else {
      t.progress = Math.min(t.progress + 1, t.target);
      if (t.progress >= t.target) t.done = true;
    }
  } else {
    t.done = !t.done;
    t.doneAt = t.done ? todayStr() : null;
  }
  scheduleSave();
  renderMain();
  refreshAllTasksIfOpen();
}
function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  scheduleSave();
  renderMain();
  refreshAllTasksIfOpen();
}

function getTodayItems() {
  const today = todayStr();
  const habits = tasks.filter(t => t.type === 'habit').sort((a, b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
  const anniversaries = tasks.filter(t => t.type === 'anniversary' && daysBetween(today, t.nextDate) >= 0 && daysBetween(today, t.nextDate) <= 10);
  const others = tasks.filter(t => t.type !== 'habit' && t.type !== 'anniversary').map(t => {
    let urgency = 999, label = '';
    if (t.type === 'window') {
      if (today < t.start || today > t.end) return null;
      urgency = t.done ? 999 : daysBetween(today, t.end);
      label = (t.recurring ? '本周期 ' : '') + '最晚 ' + fmtDate(t.end);
    } else if (t.type === 'quota') {
      if (today < t.start || today > t.end) return null;
      urgency = t.done ? 999 : daysBetween(today, t.end);
      label = t.cycleDays + '天周期内 · ' + t.progress + '/' + t.target + '次';
    } else if (t.type === 'once') {
      if (t.date !== today) return null;
      urgency = daysBetween(today, t.date);
      label = fmtDate(t.date);
    }
    return { t, urgency, label };
  }).filter(Boolean);
  others.sort((a, b) => a.t.done !== b.t.done ? (a.t.done ? 1 : -1) : a.urgency - b.urgency);
  anniversaries.sort((a, b) => daysBetween(today, a.nextDate) - daysBetween(today, b.nextDate));
  return { habits, anniversaries, others };
}

function urgencyColor(urgency, done) {
  if (done) return 'var(--text-tertiary)';
  if (urgency <= 1) return 'var(--danger-text)';
  if (urgency <= 3) return 'var(--warning-text)';
  return 'var(--text-secondary)';
}
function typeLabel(type, recurring) {
  if (type === 'window') return recurring ? '一段时间循环' : '一段时间';
  if (type === 'quota') return recurring === false ? '慢慢来喵' : '慢慢习惯喵';
  return { habit: '习惯', once: '一次性', anniversary: '纪念日喵！！' }[type] || type;
}

function typeBg(type) {
  if (type === 'window') return 'var(--warning-bg)';
  if (type === 'quota') return 'var(--info-bg)';
  if (type === 'once') return 'var(--danger-bg)';
  return 'transparent';
}

function renderRow(t, label, isHabit, urgency) {
  const done = t.done;
  const color = isHabit ? 'var(--text-secondary)' : urgencyColor(urgency, done);
  const typedBg = isHabit ? (done ? 'var(--bg-secondary)' : 'var(--habit-bg)') : (done ? 'var(--bg-secondary)' : typeBg(t.type));
  return '<div class="swipe-row" data-id="' + t.id + '">' +
    '<button class="swipe-edit-bg" onclick="startEdit(\'' + t.id + '\')">编辑</button>' +
    '<button class="swipe-delete-bg" onclick="deleteTask(\'' + t.id + '\')">删除</button>' +
    '<div class="swipe-content" style="background:' + typedBg + ';border-radius:var(--radius-md);padding-left:10px;padding-right:10px;">' +

function renderAnniversaryRow(t) {

function renderToday() {
  const { habits, anniversaries, others } = getTodayItems();
  let html = '';
  if (anniversaries.length) {
    html += '<div class="section-label">注意注意！</div>';
    anniversaries.forEach(t => html += renderAnniversaryRow(t));
  }
  if (habits.length) {
    html += '<div class="section-label">加油干啊咪</div>';
    habits.forEach(t => html += renderRow(t, null, true));
  }
  if (others.length === 0 && habits.length === 0 && anniversaries.length === 0) {
    html += '<div class="empty-state">还没有任务，点下面添加一个</div>';
  } else if (others.length) {
    html += '<div class="section-label">干活啦</div>';
    others.forEach(o => html += renderRow(o.t, o.label, false, o.urgency));
  }
  return html;
}

function getGanttRange() {
  const today = todayStr();
  const relevant = tasks.filter(t => (t.type === 'window' || t.type === 'quota' || t.type === 'once') && !t.done);
  if (relevant.length === 0) return null;
  let minStart = null, maxEnd = null;
  relevant.forEach(t => {
    const start = t.type === 'once' ? t.date : t.start;
    const end = t.type === 'once' ? t.date : t.end;
    if (minStart === null || start < minStart) minStart = start;
    if (maxEnd === null || end > maxEnd) maxEnd = end;
  });
  if (minStart === null) minStart = today;
  if (minStart > today) minStart = today;
  const anniversariesInRange = tasks.filter(t => t.type === 'anniversary' && t.nextDate >= minStart && t.nextDate <= maxEnd);
  return { start: minStart, end: maxEnd, tasks: relevant, anniversaries: anniversariesInRange };
}

const BAR_H = 18;
function dateLabelHtml(offsetPct, text, centerOffsetPx) {
  const offset = centerOffsetPx || 0;
  // Clamp the label's horizontal position so it never overflows the chart's
  // edges, but anchor it relative to the bar's own position (offsetPct)
  // rather than snapping all the way to the container edge — that produced
  // a label that looked disconnected from its bar when the bar itself was
  // near (but not exactly at) the edge.
  const clampedPct = Math.max(4, Math.min(offsetPct, 96));
  const leftExpr = 'calc(' + clampedPct + '%' + (offset ? ' + ' + offset + 'px' : '') + ')';
  let transform = 'translateX(-50%)';
  if (clampedPct <= 4) transform = 'translateX(0%)';
  else if (clampedPct >= 96) transform = 'translateX(-100%)';
  return '<div style="position:absolute;left:' + leftExpr + ';top:' + (BAR_H+4) + 'px;transform:' + transform + ';font-size:11px;color:var(--text-tertiary);white-space:nowrap;">' + text + '</div>';
}

function renderGantt() {
  const range = getGanttRange();
  if (!range) return '<div class="empty-state">还没有窗口/配额/一次性任务</div>';
  const today = todayStr();
  const totalDays = Math.max(daysBetween(range.start, range.end), 1);

  let html = '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-tertiary);margin-bottom:6px;">' +
    '<span>' + fmtDate(range.start) + '（今天）</span><span>' + fmtDate(range.end) + '</span></div>';
  html += '<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px;">起点取未完成任务中最早的开始日，终点取所有任务中最晚的结束日</div>';
  html += '<div style="position:relative;">';

  range.anniversaries.forEach(a => {
    const offsetPct = Math.max(0, Math.min(daysBetween(range.start, a.nextDate) / totalDays * 100, 100));
    const showDate = a.nextDate !== today;
    html += '<div style="margin-bottom:' + (showDate ? 26 : 14) + 'px;">';
    html += '<div style="font-size:14px;color:var(--purple-text);margin-bottom:4px;">🤍 ' + escapeHtml(a.name) + '</div>';
    html += '<div style="position:relative;height:' + BAR_H + 'px;">' +
      '<div class="gantt-bar" style="left:' + offsetPct + '%;width:' + BAR_H + 'px;height:' + BAR_H + 'px;background:var(--purple-bg);border-radius:50%;"></div>' +
      (showDate ? dateLabelHtml(offsetPct, fmtDate(a.nextDate), BAR_H/2) : '') +
    '</div></div>';
  });

  range.tasks.sort((a, b) => {
    const as = a.type === 'once' ? a.date : a.start;
    const bs = b.type === 'once' ? b.date : b.start;
    return as < bs ? -1 : 1;
  });

  range.tasks.forEach(t => {
    const start = t.type === 'once' ? t.date : t.start;
    const end = t.type === 'once' ? t.date : t.end;
    const offsetPct = daysBetween(range.start, start) / totalDays * 100;
    const widthPct = daysBetween(start, end) / totalDays * 100;
    const colorBg = t.type === 'window' ? 'var(--warning-bg)' : t.type === 'quota' ? 'var(--info-bg)' : 'var(--danger-bg)';
    const showDate = !(t.type === 'once' && t.date === today);

    html += '<div style="margin-bottom:' + (showDate ? 26 : 14) + 'px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px;">' +
      '<span style="font-size:14px;color:var(--text);min-width:0;max-width:75%;word-break:break-word;">' + escapeHtml(t.name) + (t.type==='quota' ? ' · ' + t.progress + '/' + t.target : '') + '</span>' +
      '<span style="font-size:11px;color:var(--text-tertiary);flex-shrink:0;">' + typeLabel(t.type, t.recurring) + '</span></div>';
    html += '<div style="position:relative;height:' + BAR_H + 'px;">';
    if (t.type === 'once') {
      html += '<div class="gantt-bar" style="left:' + offsetPct + '%;width:' + BAR_H + 'px;height:' + BAR_H + 'px;background:' + colorBg + ';border-radius:50%;"></div>';
      if (showDate) html += dateLabelHtml(offsetPct, fmtDate(t.date), BAR_H/2);
    } else {
      const barWidthExpr = 'max(' + widthPct + '%, ' + BAR_H + 'px)';
      html += '<div class="gantt-bar" style="left:' + offsetPct + '%;width:' + barWidthExpr + ';height:' + BAR_H + 'px;background:' + colorBg + ';border-radius:' + (BAR_H/2) + 'px;"></div>';
      // Bars spanning less than ~22% of the timeline are too narrow to show
      // separate start/end labels without overlapping text, so show a single
      // combined "start – end" label instead, anchored like a point label.
      if (widthPct < 22) {
        const centerPct = Math.max(0, Math.min(offsetPct + widthPct / 2, 100));
        html += dateLabelHtml(centerPct, fmtDate(start) + ' – ' + fmtDate(end), 0);
      } else {
        html += '<div style="position:absolute;left:' + offsetPct + '%;top:' + (BAR_H+4) + 'px;font-size:11px;color:var(--text-tertiary);white-space:nowrap;">' + fmtDate(start) + '</div>';
        html += '<div style="position:absolute;left:calc(' + offsetPct + '% + ' + barWidthExpr + ');top:' + (BAR_H+4) + 'px;transform:translateX(-100%);font-size:11px;color:var(--text-tertiary);white-space:nowrap;">' + fmtDate(end) + '</div>';
      }
    }
    html += '</div></div>';
  });

  html += '</div>';
  return html;
}

let selectedWindowCycleUnit = 'month';

    '<button type="button" class="type-btn' + (selectedWindowCycleUnit==='week'?' active':'') + '" data-type="window" id="f-window-week-btn" onclick="selectWindowCycleUnit(\'week\')">每周循环</button>' +

function selectWindowCycleUnit(u) {
  selectedWindowCycleUnit = u;

  if (mb) mb.classList.toggle('active', u === 'month');

function selectAnnivUnit(u) {

  if (yb) yb.classList.toggle('active', u === 'year');

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-grid .type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  refreshExtraFields();
}

function buildTaskDataFromForm(type, name) {
  if (type === 'habit') {
    return { type, name };
  } else if (type === 'window') {
    const start = document.getElementById('f-start').value;
    const end = document.getElementById('f-end').value;
    if (!start || !end || end < start) return null;
    const recurring = document.getElementById('f-recurring').checked;
    const cycleUnit = recurring ? selectedWindowCycleUnit : null;
    return { type, name, start, end, recurring, cycleUnit };
  } else if (type === 'quota') {
    const target = parseInt(document.getElementById('f-target').value) || 1;
    const cycleDays = parseInt(document.getElementById('f-cycledays').value) || 7;
    const recurring = document.getElementById('f-quota-recurring').checked;
    const start = todayStr();
    const end = addDays(start, cycleDays);
    return { type, name, start, end, target, cycleDays, recurring };
  } else if (type === 'once') {
    const date = document.getElementById('f-date').value;
    if (!date) return null;
    return { type, name, date };
  } else if (type === 'anniversary') {
    const date = document.getElementById('f-anniv-date').value;
    if (!date) return null;
    return { type, name, nextDate: date, anniversaryUnit: selectedAnnivUnit };
  }
  return null;
}

function updateTask(id, data) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  Object.keys(data).forEach(k => { t[k] = data[k]; });
  // when editing a quota task's cycle settings, keep progress sane relative to the new target
  if (t.type === 'quota') {
    t.progress = Math.min(t.progress, t.target);
    t.done = t.progress >= t.target;
  }
  scheduleSave();
  renderMain();
  refreshAllTasksIfOpen();
}

function submitForm() {
  const nameEl = document.getElementById('f-name');
  const name = nameEl.value.trim();
  const type = selectedType;
  if (!name) { nameEl.focus(); return; }

  const data = buildTaskDataFromForm(type, name);
  if (!data) return;

  const wasEditing = !!editingTaskId;

  if (editingTaskId) {
    updateTask(editingTaskId, data);
  } else {
    addTask(data);
  }

  nameEl.value = '';
  nameEl.blur();
  editingTaskId = null;
  selectType('habit');
  refreshFormHeader();

  if (wasEditing) {
    restoreAfterEdit();
  }
}

function refreshFormHeader() {
  const card = document.getElementById('task-form-card');
  if (!card) return;
  const titleRow = card.querySelector('.form-title-row');
  if (!titleRow) return;
  titleRow.innerHTML =
    '<span class="form-title">' + (editingTaskId ? '修改行动计划中...' : '新的任务咪') + '</span>' +
    '<div class="form-title-actions">' +
      (editingTaskId ? '<button class="cancel-edit-btn" onclick="cancelEdit()">不要了</button>' : '') +
      '<button class="confirm-btn' + (editingTaskId ? ' editing' : '') + '" onclick="submitForm()">确认喵</button>' +
    '</div>';
}

function fillFormForEdit(t) {
  document.getElementById('f-name').value = t.name;
  selectType(t.type);
  // selectType triggers refreshExtraFields synchronously via render path below,
  // but we call it directly here to guarantee the right fields exist before filling them.
  refreshExtraFields();

  if (t.type === 'window') {
    document.getElementById('f-start').value = t.start;
    document.getElementById('f-end').value = t.end;
    const recurringBox = document.getElementById('f-recurring');
    recurringBox.checked = !!t.recurring;
    onRecurringChange();
    if (t.recurring) selectWindowCycleUnit(t.cycleUnit || 'month');
  } else if (t.type === 'quota') {
    document.getElementById('f-target').value = t.target;
    document.getElementById('f-cycledays').value = t.cycleDays;
    document.getElementById('f-quota-recurring').checked = t.recurring !== false;
  } else if (t.type === 'once') {
    document.getElementById('f-date').value = t.date;
  } else if (t.type === 'anniversary') {
    document.getElementById('f-anniv-date').value = t.nextDate;
    selectAnnivUnit(t.anniversaryUnit || 'year');
  }
}

let editScrollY = 0;
let editFromDrawer = false;

function startEdit(id, fromDrawer) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editScrollY = window.scrollY;
  editFromDrawer = !!fromDrawer;
  closeAllSwipes(null);
  editingTaskId = id;
  fillFormForEdit(t);
  refreshFormHeader();
  const card = document.getElementById('task-form-card');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restoreAfterEdit() {
  if (editFromDrawer) {
    openAllTasks();
  } else {
    window.scrollTo({ top: editScrollY, behavior: 'smooth' });
  }
  editFromDrawer = false;
}

function cancelEdit() {
  editingTaskId = null;
  document.getElementById('f-name').value = '';
  selectType('habit');
  refreshFormHeader();
  restoreAfterEdit();
}

// ====== ALL TASKS DRAWER ======
function taskSortKey(t) {
  // Use the most recently relevant date as the sort key: doneAt if completed,
  // otherwise start/date/nextDate (whichever the task type has), falling back to id (creation order).
  if (t.doneAt) return t.doneAt;
  if (t.type === 'once') return t.date;
  if (t.type === 'anniversary') return t.nextDate;
  if (t.start) return t.start;
  return '';
}

function taskMetaText(t) {
  if (t.type === 'habit') return '习惯';
  if (t.type === 'once') return fmtDate(t.date);
  if (t.type === 'anniversary') return fmtDate(t.nextDate) + (t.anniversaryUnit === 'year' ? ' 每年' : ' 每月');
  if (t.type === 'window') return fmtDate(t.start) + ' – ' + fmtDate(t.end) + (t.recurring ? ' 循环' : '');
  if (t.type === 'quota') return t.progress + '/' + t.target + ' · ' + t.cycleDays + '天' + (t.recurring !== false ? ' 循环' : '');
  return '';
}

function renderAllTasksContent() {
  const sorted = tasks.slice().sort((a, b) => {
    const ka = taskSortKey(a), kb = taskSortKey(b);
    if (ka === kb) return 0;
    return ka < kb ? 1 : -1; // descending (newest/latest first)
  });
  const pending = sorted.filter(t => !t.done);
  const done = sorted.filter(t => t.done);

  function renderAtRow(t) {
    return '<div class="swipe-row at-swipe-row" data-id="' + t.id + '">' +
      '<button class="swipe-edit-bg" onclick="startEditFromDrawer(\'' + t.id + '\')">编辑</button>' +
      '<button class="swipe-delete-bg" onclick="deleteTask(\'' + t.id + '\')">删除</button>' +
      '<div class="swipe-content at-row">' +
        '<span class="at-name' + (t.done ? ' done' : '') + '">' + escapeHtml(t.name) + '</span>' +
      '</div>' +
    '</div>';
  }

  function renderGroup(label, list) {
    let html = '<div class="at-section-label">' + label + ' (' + list.length + ')</div>';
    if (list.length === 0) {
      html += '<div class="at-empty">暂无</div>';
    } else {
      list.forEach(t => { html += renderAtRow(t); });
    }
    return html;
  }

  return renderGroup('进行中 / 未完成', pending) + renderGroup('已完成', done);
}

function startEditFromDrawer(id) {
  closeAllTasks();
  setTimeout(() => startEdit(id, true), 260);
}

function openAllTasks() {
  document.getElementById('all-tasks-content').innerHTML = renderAllTasksContent();
  attachSwipeHandlers();
  document.getElementById('all-tasks-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.body.style.touchAction = 'none';
  drawerOpen = true;
}

function closeAllTasks() {
  document.getElementById('all-tasks-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.body.style.touchAction = '';
  drawerOpen = false;
}

let drawerOpen = false;
document.addEventListener('touchmove', (e) => {
  if (!drawerOpen) return;
  const drawer = document.getElementById('all-tasks-drawer');
  if (drawer && drawer.contains(e.target)) return;
  e.preventDefault();
}, { passive: false });

window.openAllTasks = openAllTasks;
window.closeAllTasks = closeAllTasks;
window.startEdit = startEdit;
window.startEditFromDrawer = startEditFromDrawer;
window.cancelEdit = cancelEdit;

// Extra safety net against double-tap-to-zoom on browsers that ignore touch-action in edge cases
let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTouchEnd <= 350) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, { passive: false });

// Some iOS Safari versions fail to reset the page scroll position after the
// on-screen keyboard is dismissed (the visual viewport resizes but the
// layout viewport's scroll offset is left stale). As a safety net, when the
// keyboard closes (visualViewport height returns to roughly the full window
// height) and no input is focused anymore, nudge the scroll position back
// into a valid range.
if (window.visualViewport) {
  let lastVVHeight = window.visualViewport.height;
  window.visualViewport.addEventListener('resize', () => {
    const vv = window.visualViewport;
    const keyboardClosed = vv.height > lastVVHeight && vv.height >= window.innerHeight - 60;
    lastVVHeight = vv.height;
    if (keyboardClosed) {
      const active = document.activeElement;
      const stillEditing = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
      if (!stillEditing) {
        setTimeout(() => {
          const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
          if (window.scrollY > Math.max(0, maxScroll)) {
            window.scrollTo({ top: Math.max(0, maxScroll), behavior: 'auto' });
          }
        }, 50);
      }
    }
  });
}

// ====== SWIPE TO DELETE ======
function attachSwipeHandlers(root) {
  const scope = root || document;
  scope.querySelectorAll('.swipe-row').forEach(row => {
    if (row.dataset.swipeBound) return;
    row.dataset.swipeBound = '1';
    const content = row.querySelector('.swipe-content');
    const hasEdit = !!row.querySelector('.swipe-edit-bg');
    let startX = 0, startY = 0, currentX = 0, dragging = false, decided = false, isHorizontal = false;
    const ACTION_WIDTH = 72;

    function applyOffset(x) {
      // Shrink content's width (instead of translating it) so the revealed
      // edit/delete button becomes visible, but nothing is ever pushed past
      // the row's clip boundary.
      // Swiping left (x<0): keep left edge fixed, shrink from the right
      //   to reveal the delete button on the right.
      // Swiping right (x>0): move the left edge right and shrink width
      //   by the same amount, keeping the right edge fixed, to reveal
      //   the edit button on the left.
      if (x <= 0) {
        content.style.left = '0px';
        content.style.width = 'calc(100% - ' + (-x) + 'px)';
      } else {
        content.style.left = x + 'px';
        content.style.width = 'calc(100% - ' + x + 'px)';
      }
    }

    content.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentX = 0;
      dragging = true;
      decided = false;
      content.style.transition = 'none';
    }, { passive: true });

    content.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!decided) {
        if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
          decided = true;
          isHorizontal = Math.abs(dx) > Math.abs(dy);
        } else {
          return;
        }
      }
      if (!isHorizontal) return;
      const minX = -ACTION_WIDTH - 20;
      const maxX = hasEdit ? ACTION_WIDTH + 20 : 0;
      currentX = Math.min(maxX, Math.max(dx, minX));
      applyOffset(currentX);
    }, { passive: true });

    content.addEventListener('touchend', () => {
      dragging = false;
      content.style.transition = 'left 0.15s ease-out, width 0.15s ease-out';
      if (isHorizontal && currentX < -ACTION_WIDTH / 2) {
        closeAllSwipes(row);
        applyOffset(-ACTION_WIDTH);
      } else if (isHorizontal && hasEdit && currentX > ACTION_WIDTH / 2) {
        closeAllSwipes(row);
        applyOffset(ACTION_WIDTH);
      } else {
        applyOffset(0);
      }
    });

    row._resetSwipe = () => {
      content.style.transition = 'left 0.15s ease-out, width 0.15s ease-out';
      applyOffset(0);
    };
  });
}

function closeAllSwipes(exceptRow) {
  document.querySelectorAll('.swipe-row').forEach(r => {
    if (r === exceptRow) return;
    if (r._resetSwipe) r._resetSwipe();
  });
}

// Close any open swipe row when the user taps/clicks anywhere outside of it.
document.addEventListener('touchstart', (e) => {
  const insideRow = e.target.closest && e.target.closest('.swipe-row');
  closeAllSwipes(insideRow || null);
}, { passive: true, capture: true });
document.addEventListener('mousedown', (e) => {
  const insideRow = e.target.closest && e.target.closest('.swipe-row');
  closeAllSwipes(insideRow || null);
}, { capture: true });
</script>
